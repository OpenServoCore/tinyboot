[build]
target = "riscv32ec-unknown-none-elf.json"

[unstable]
build-std = ["core"]
json-target-spec = true

[target.riscv32ec-unknown-none-elf]
rustflags = [
  "-C", "link-arg=-Tlink.x",
]
runner = "probe-rs run --chip ch32v003"

[profile.dev]
opt-level = "z"
lto = true
codegen-units = 1
debug = 1

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
