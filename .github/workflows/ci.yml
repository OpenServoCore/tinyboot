name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  libs-core:
    name: Libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p tinyboot -p tinyboot-protocol --all-targets -- -D warnings
      - run: cargo build -p tinyboot -p tinyboot-protocol
      - run: cargo test -p tinyboot -p tinyboot-protocol
      - run: cargo doc -p tinyboot -p tinyboot-protocol --no-deps
      - run: cargo build -p tinyboot -p tinyboot-protocol --release

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tinyboot-cli
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo build
      - run: cargo build --release

  ch32:
    name: CH32 (${{ matrix.chip }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - chip: ch32v003f4p6
            target: examples/ch32/boot/riscv32ec-unknown-none-elf.json
            target-flags: -Zbuild-std=core -Zjson-target-spec
          - chip: ch32v003a4m6
            target: examples/ch32/boot/riscv32ec-unknown-none-elf.json
            target-flags: -Zbuild-std=core -Zjson-target-spec
          - chip: ch32v003f4u6
            target: examples/ch32/boot/riscv32ec-unknown-none-elf.json
            target-flags: -Zbuild-std=core -Zjson-target-spec
          - chip: ch32v003j4m6
            target: examples/ch32/boot/riscv32ec-unknown-none-elf.json
            target-flags: -Zbuild-std=core -Zjson-target-spec
          - chip: ch32v103c6t6
            target: riscv32imc-unknown-none-elf
            target-flags: ""
          - chip: ch32v103c8t6
            target: riscv32imc-unknown-none-elf
            target-flags: ""
          - chip: ch32v103c8u6
            target: riscv32imc-unknown-none-elf
            target-flags: ""
          - chip: ch32v103r8t6
            target: riscv32imc-unknown-none-elf
            target-flags: ""
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src,rustfmt,clippy,llvm-tools
          rustup +nightly target add ${{ matrix.target }} 2>/dev/null || true
          cargo install cargo-binutils
          mkdir -p /tmp/sizes
      - name: Clippy libraries
        run: cargo +nightly clippy -p tinyboot-ch32-hal -p tinyboot-ch32-boot -p tinyboot-ch32-app --features ${{ matrix.chip }} --target ${{ matrix.target }} ${{ matrix.target-flags }} -- -D warnings
      - name: Build libraries
        run: cargo +nightly build -p tinyboot-ch32-hal -p tinyboot-ch32-boot -p tinyboot-ch32-app --features ${{ matrix.chip }} --target ${{ matrix.target }} ${{ matrix.target-flags }} --release
      - name: Doc libraries
        run: cargo +nightly doc -p tinyboot-ch32-hal -p tinyboot-ch32-boot -p tinyboot-ch32-app --features ${{ matrix.chip }} --target ${{ matrix.target }} ${{ matrix.target-flags }} --no-deps
      - name: Fmt boot
        run: cd examples/ch32/boot && cargo +nightly fmt --all -- --check
      - name: Clippy boot (system-flash)
        run: cd examples/ch32/boot && cargo +nightly clippy --features "${{ matrix.chip }},system-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} -- -D warnings
      - name: Build boot (system-flash)
        run: |
          cd examples/ch32/boot && cargo +nightly build --features "${{ matrix.chip }},system-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} --release
          TARGET_DIR=$(basename "${{ matrix.target }}" .json)
          rust-size "target/$TARGET_DIR/release/boot" | tail -1 | awk '{print "${{ matrix.chip }},boot,system-flash," $4}' >> /tmp/sizes/sizes.csv
      - name: Clippy boot (user-flash)
        run: cd examples/ch32/boot && cargo +nightly clippy --features "${{ matrix.chip }},user-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} -- -D warnings
      - name: Build boot (user-flash)
        run: |
          cd examples/ch32/boot && cargo +nightly build --features "${{ matrix.chip }},user-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} --release
          TARGET_DIR=$(basename "${{ matrix.target }}" .json)
          rust-size "target/$TARGET_DIR/release/boot" | tail -1 | awk '{print "${{ matrix.chip }},boot,user-flash," $4}' >> /tmp/sizes/sizes.csv
      - name: Fmt app
        run: cd examples/ch32/app && cargo +nightly fmt --all -- --check
      - name: Clippy app (system-flash)
        run: cd examples/ch32/app && cargo +nightly clippy --features "${{ matrix.chip }},system-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} -- -D warnings
      - name: Build app (system-flash)
        run: |
          cd examples/ch32/app && cargo +nightly build --features "${{ matrix.chip }},system-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} --release
          TARGET_DIR=$(basename "${{ matrix.target }}" .json)
          rust-size "target/$TARGET_DIR/release/app" | tail -1 | awk '{print "${{ matrix.chip }},app,system-flash," $4}' >> /tmp/sizes/sizes.csv
      - name: Clippy app (user-flash)
        run: cd examples/ch32/app && cargo +nightly clippy --features "${{ matrix.chip }},user-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} -- -D warnings
      - name: Build app (user-flash)
        run: |
          cd examples/ch32/app && cargo +nightly build --features "${{ matrix.chip }},user-flash" --target $(basename "${{ matrix.target }}") ${{ matrix.target-flags }} --release
          TARGET_DIR=$(basename "${{ matrix.target }}" .json)
          rust-size "target/$TARGET_DIR/release/app" | tail -1 | awk '{print "${{ matrix.chip }},app,user-flash," $4}' >> /tmp/sizes/sizes.csv
      - name: Upload sizes
        uses: actions/upload-artifact@v6
        with:
          name: sizes-${{ matrix.chip }}
          path: /tmp/sizes/sizes.csv

  size-report:
    name: Size Report
    if: github.event_name == 'pull_request'
    needs: ch32
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download all size artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sizes-*
          path: /tmp/sizes
      - name: Generate size table
        run: |
          cat /tmp/sizes/*/sizes.csv | sort -t, -k3,3 -k2,2r -k1,1 > /tmp/all-sizes.csv
          CSV=/tmp/all-sizes.csv
          {
            echo "## Binary Sizes"
            echo ""
            echo "| Chip | Example | Mode | Size |"
            echo "|------|---------|------|-----:|"
            while IFS=, read -r chip crate flash size; do
              echo "| \`$chip\` | $crate | $flash | $size |"
            done < "$CSV"
          } > /tmp/sizes/comment.md
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: /tmp/sizes/comment.md
