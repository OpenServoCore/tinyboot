name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libudev-dev
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: rustup toolchain install nightly --profile minimal --component rust-src,rustfmt,clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cd examples/ch32/system-flash && cargo +nightly fmt --all -- --check
      - run: cd examples/ch32/system-flash && cargo +nightly clippy -- -D warnings
      - run: cd examples/ch32/system-flash && cargo +nightly build --release
      - run: cd examples/ch32/user-flash && cargo +nightly fmt --all -- --check
      - run: cd examples/ch32/user-flash && cargo +nightly clippy -- -D warnings
      - run: cd examples/ch32/user-flash && cargo +nightly build --release
